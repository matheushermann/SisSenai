<!DOCTYPE html>
<html lang="pt-br"
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="estilo.css">
  <title>SisSenai - Cadastro de Produtos</title>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="clientes.html">Clientes</a>
    <a href="produtos.html">produtos</a>
    <a href="vendas.html">Vendas</a>
              <a href="consulta_vendas.html">Consulta Vendas</a>
  </nav>
<header class="banner">
  <h1>Gestão de Produtos</h1>
  <p>Cadastre e gerencie seus produtos do estoque</p>
</header>
<div class="container">
  <div class="card">
    <h2>Novo Produto</h2>
    <form action="/salvar produto" method="POST">
      <input type="text" name="descricao" placeholder="Descricao do produto" required>
      <input type="number" step="0,01" name="preco" placeholder="Preço de Venda" required>
      <input type="number" name="estoque" placeholder="Quantidade em Estoque" required>
      <button type="submit">Salvar no Estoque</button>
    </form>
  </div>

  <div class="card" style="margin-top: 20px;">
    <h2>Produtos no Estoque</h2>
    <table>
      <tr>
        <th>Descrição</th>
        <th>Preço(R$)</th>
        <th>Estoque</th>
      </tr>
    </thead>
    <tbody id="lista-produtos">
    </tbody>
    </table>
  </div>
</div>
</body>
