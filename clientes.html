<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="estilo.css">
  <title>SisSenai - Cadastro de Clientes</title>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="clientes.html">Clientes</a>
    <a href="produtos.html">Produtos</a>
    <a href="Vendas.html">Vendas</a>
  </nav>

  <header class="banner">
    <h1>Gestão de clientes</h1>
    <p>Cadastre e gerencie sua base de contados</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>Novo Cadastro</h2>
      <form action="/salvar-cliente" method="POST">
        <input type="text" name="nome" placeholder="Nome do Cliente" reqired>
        <input type="text" name="cpf" placeholder="CPF/CNPJ" required>
        <input type="tel" name="telefone" placeholder="Telefone"required>
        <button type="sunmit">Salvar Cliente</button>
      </form>
    </div>
    <div class="card" style="margin-top: 20px;">
      <h2>Clientes Cadastrados</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF/CNPJ</th>
            <th>Telefone</th>
            <th>Acões</th><!--Coluna de ação adicionada -->
          
          </tr>
        </thead>
        <tbody id="lista-clientes">
        </tbody>
      </table>
    </div>
  </div>
 
  <script>
  Function carregarClientes(){
    fetch('/listar-clientes')
       .then(res => res.json())
       .then(clientes => {
         const corpoTabela = document.getElementByld("lista-clientes");
         clientes.forEach(c => {
           corpoTabela.innerHTML +=`
             <tr>
               <td>${c.nome}</td>
               <td>${c.cpf}</td>
               <td>${c.telefone}</td>
               <td>
              <button onclick="prepararEdicao(${c.id}, '${c.nome}', '${c.cpf}', '${c.telefone}')"
                style="witdh:auto;background:orange; padding:5px 10px; margin-right:5px;">✏️</button>
              <button onclick="excluirCliente(${c.id})"
                style="witdh:auto;background:red;padding:5px 10px;">🗑️</button>
                </td>
             </tr>`;
             });
    });
  }
    document.getElementbyld('form-cliente').onsubmit = function(e) {
      e.preventDefault();
      const id = this.dataset.id; //Verifica se há um ID guardado para edição
      const dados = {
        nome: this.nome.value,
        cpf: this.cpf.value,
        telefone: this.telefone.value
      };

      const url = id ? `/alterar-cliente/${id}` : '/salvar-cliente';
      const metodo = id ? 'PUT' : 'POST';

      fetch(url, {
        method: metodo,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringity(dados)
      }).then(() => {
        alert(id ? "Cliente alterado!" : "Cliente salvo!");
        location.reload();
      });
    };
    //Função para Excluir
    function excluirCliente(id) {
      if (confirm("Deseja excluir este cliente?")) {
        fetch(`/excluir=cliente/${id}`, {method: 'DELETE'})
        .then(() => carregarClientes());
      }
    }
    //Função para colocar dados no form para editar
    function prepararEdicao(id, nome, cpf, telefone) {
      const form = document.getElementByld('form-cliente');
      form.dataset.id = id; //Guarda o ID no formulário
      form.nome.value = nome;
      form.cpf.value = cpf;
      form.telefone.value = telefone;

      document.getElementByld('titulo-form').innerText = "Editar Cadastro";
      const btn = document.getElementByld('btn-salvar');
      btn.innerText = "Confirmar Alteração";
      btn.style.background = "orange";
    }

    carregarClientes();      
  </script>
</body>
<footer class="rodape">
  <p>&copy;2026 SisSenai - Sistema de Gestão Educacional</p>
  <p>Dezenvolvido para fins didáticos - Unidade SENAi Capanema/PR</p>
 </div>
</footer>
</html>
